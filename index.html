<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品组装器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#555}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;
  background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column;overflow:hidden;
}

/* Toolbar */
#toolbar{
  background:#161b22;padding:10px 16px;display:flex;align-items:center;gap:10px;
  flex-shrink:0;border-bottom:1px solid #21262d;z-index:10;
}
#toolbar h1{font-size:15px;font-weight:600;color:#58a6ff;margin-right:auto;letter-spacing:.5px}
#toolbar input,#toolbar select{
  padding:6px 10px;border:1px solid #30363d;border-radius:6px;
  background:#0d1117;color:#c9d1d9;outline:none;font-size:12px;transition:border-color .2s;
}
#toolbar input:focus,#toolbar select:focus{border-color:#58a6ff}
#toolbar button{
  padding:6px 14px;border:1px solid #30363d;border-radius:6px;
  cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;
  background:#21262d;color:#c9d1d9;
}
#toolbar button:hover{background:#30363d}
.btn-primary{background:#238636!important;border-color:#238636!important;color:#fff!important}
.btn-primary:hover{background:#2ea043!important}
.btn-danger{background:#da3633!important;border-color:#da3633!important;color:#fff!important}
.btn-danger:hover{background:#f85149!important}
#mergeStatus{font-size:12px;color:#7ee787;font-weight:500}
#stats{font-size:11px;color:#8b949e}

/* Main layout */
#main{display:flex;flex:1;overflow:hidden}

/* Item panel */
#item-panel{flex:1;overflow-y:auto;padding:12px;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start}

/* Date header */
.date-head{
  width:100%;padding:14px 4px 6px;color:#58a6ff;font-size:13px;font-weight:600;
  border-bottom:1px solid #21262d;margin-bottom:4px;flex-basis:100%;
}

/* Card */
.item-card{
  background:#161b22;border-radius:8px;overflow:hidden;cursor:pointer;
  transition:all .2s;border:1px solid #21262d;width:220px;flex-shrink:0;position:relative;
}
.item-card:hover{border-color:#58a6ff;box-shadow:0 4px 12px rgba(88,166,255,.15);transform:translateY(-2px)}
.item-card.selected{border-color:#238636;box-shadow:0 0 0 2px rgba(35,134,54,.3)}
.item-card .thumb-wrap{width:100%;height:180px;background:#0d1117;overflow:hidden;display:flex;align-items:center;justify-content:center}
.item-card .thumb{width:100%;height:180px;display:block;object-fit:cover}
.item-card .no-img{width:100%;height:180px;display:flex;align-items:center;justify-content:center;color:#30363d;font-size:36px;background:#0d1117}
.item-card .info{padding:8px 10px;height:68px;display:flex;flex-direction:column;justify-content:space-between}
.item-card .title{color:#c9d1d9;font-size:12px;line-height:1.4;max-height:34px;overflow:hidden}
.item-card .meta{color:#8b949e;font-size:11px;display:flex;align-items:center;gap:4px;white-space:nowrap}
.item-card .meta-time{color:#8b949e;margin-left:auto;flex-shrink:0}
.item-card .check{
  position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:6px;
  background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
  font-size:12px;color:#fff;transition:all .15s;backdrop-filter:blur(4px);
}
.item-card.selected .check{background:#238636}
.item-card .img-badge{
  position:absolute;top:8px;left:8px;padding:3px 7px;border-radius:6px;
  background:rgba(0,0,0,.6);color:#d2991d;font-size:11px;font-weight:700;backdrop-filter:blur(4px);
}
.item-card .tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:10px;font-weight:600;flex-shrink:0}
.tag-main{background:#238636;color:#fff}
.tag-detail{background:#1f6feb;color:#fff}
.tag-size{background:#d2991d;color:#000}
.tag-model{background:#6e7681;color:#fff}
.tag-set{background:#d2991d;color:#000}
.item-card .saved-mark{
  position:absolute;bottom:40px;right:8px;width:22px;height:22px;border-radius:11px;
  background:#238636;color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3);
}
.item-card .ai-mark{
  position:absolute;bottom:40px;right:34px;padding:2px 6px;border-radius:11px;
  background:#1f6feb;color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.3);
}

/* Side panel */
#side-panel{
  width:400px;min-width:400px;background:#161b22;border-left:1px solid #21262d;
  display:flex;flex-direction:column;overflow-y:auto;
}
.section{padding:10px 16px;border-bottom:1px solid #21262d}
.section label{font-size:11px;color:#8b949e;display:block;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.5px}

/* Image pool */
.pool{display:flex;flex-wrap:wrap;gap:6px;min-height:44px;align-items:flex-start}
.pool-img{width:64px;height:64px;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all .15s;background:#0d1117}
.pool-img:hover{border-color:#58a6ff;transform:scale(1.05)}
.pool-img.keep{border-color:#30363d}
.empty-hint{color:#484f58;font-size:12px;align-self:center;padding:8px 0}

/* Inputs */
input[type=text],textarea{
  width:100%;padding:8px 10px;border:1px solid #30363d;border-radius:6px;
  background:#0d1117;color:#c9d1d9;font-size:12px;outline:none;resize:vertical;
  transition:border-color .2s;font-family:inherit;
}
input[type=text]:focus,textarea:focus{border-color:#58a6ff}
textarea{min-height:80px;line-height:1.5}

/* Smart select floating button */
#smartBtn{position:fixed;z-index:9999;padding:6px 14px;background:#238636;color:#fff;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);display:none;white-space:nowrap}
#smartBtn:hover{background:#2ea043}
#smartBtn.show{display:block}

/* Saved products */
.prod-list{max-height:280px;overflow-y:auto}
.prod-item{
  background:#0d1117;margin:4px 0;padding:8px 10px;border-radius:6px;cursor:pointer;
  font-size:12px;border:1px solid #21262d;display:flex;align-items:center;gap:10px;
  transition:all .15s;
}
.prod-item:hover{background:#1c2128;border-color:#30363d}
.prod-thumb{width:44px;height:44px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#0d1117}
.prod-info{flex:1;min-width:0}
.prod-info strong{display:block;color:#c9d1d9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px}
.prod-info span{color:#8b949e;font-size:11px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}

/* Buttons in panel */
#btnSave,#btnExport{
  padding:9px 16px;border:none;border-radius:6px;cursor:pointer;font-size:13px;
  font-weight:600;transition:all .15s;width:100%;
}
#btnSave{background:#238636;color:#fff}
#btnSave:hover{background:#2ea043}
#btnExport{background:#21262d;color:#c9d1d9;border:1px solid #30363d;margin-top:6px}
#btnExport:hover{background:#30363d}

/* Toast */
#toast{
  position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;z-index:999;
  font-size:13px;font-weight:500;display:none;box-shadow:0 8px 24px rgba(0,0,0,.4);
  pointer-events:none;animation:toastIn .3s ease;
}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast-ok{background:#238636;color:#fff}
.toast-err{background:#da3633;color:#fff}

/* Tab bar */
.tab-bar{display:flex;align-items:center;border-bottom:1px solid #21262d;flex-shrink:0;background:#161b22;position:sticky;top:0;z-index:5}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab:hover{color:#c9d1d9}
.tab.active{color:#58a6ff;border-bottom-color:#58a6ff}
.ai-dot{width:8px;height:8px;border-radius:50%;margin-left:auto;margin-right:12px;flex-shrink:0}
.ai-dot.ok{background:#238636}
.ai-dot.err{background:#da3633}
.ai-toggle{accent-color:#58a6ff;margin-right:2px;cursor:pointer}
.tab-content{display:none;overflow-y:auto;flex:1}
.tab-content.active{display:block}

/* Load more */
#loadMoreSentinel{
  text-align:center;padding:20px;color:#8b949e;cursor:pointer;
  font-size:13px;flex-basis:100%;transition:color .15s;
}
#loadMoreSentinel:hover{color:#c9d1d9}
</style>
</head>
<body>

<div id="toolbar">
  <h1>商品组装器</h1>
  <input type="text" id="searchInput" placeholder="搜索标题..." />
  <select id="dateFilter"><option value="">全部日期</option></select>
  <select id="imgFilter">
    <option value="0">全部</option>
    <option value="1" selected>有图片</option>
    <option value="2">无图片</option>
  </select>
  <select id="setFilter">
    <option value="0">全部类型</option>
    <option value="1">单品</option>
    <option value="2">套装</option>
  </select>
  <span id="stats">加载中...</span>
  <span id="mergeStatus"></span>
  <button id="btnDeselect">取消全选</button>
  <button id="btnRefresh">刷新数据</button>
  <button class="btn-danger" id="btnLogin">重新登录</button>
</div>

<div id="main">
  <div id="item-panel"></div>

  <div id="side-panel">
    <div class="tab-bar">
      <div class="tab active" data-tab="workspace">商品工作区</div>
      <div class="tab" data-tab="ai">AI 配置</div>
      <span id="aiStatusDot" class="ai-dot"></span>
    </div>

    <!-- Workspace Tab -->
    <div class="tab-content active" id="tab-workspace">
      <div class="section">
        <label>商品图片 <span id="selCount">(选中0条)</span></label>
        <div class="pool" id="imgPool"><span class="empty-hint">点击左侧卡片选择素材</span></div>
      </div>

      <div class="section">
        <div style="display:flex;gap:10px">
          <div style="flex:1"><label>款号</label><input type="text" id="prodStyle" placeholder="自动识别..." /></div>
          <div style="flex:1"><label>价格</label><input type="text" id="prodPrice" placeholder="自动识别..." /></div>
        </div>
      </div>

      <div class="section">
        <label>文案</label>
        <textarea id="prodCopy" placeholder="选中素材后自动拼接..."></textarea>
      </div>

      <div class="section">
        <button id="btnSave">保存此商品</button>
      </div>

      <div class="section">
        <label>已保存 (<span id="savedCount">0</span>)</label>
        <div class="prod-list" id="savedList"><span class="empty-hint">暂无</span></div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="btnAiProcess" style="flex:1;background:#1f6feb;color:#fff;border:none">AI 处理</button>
          <button id="btnExport" style="flex:1">导出 Excel</button>
        </div>
        <div id="aiProcessStatus" style="margin-top:6px;font-size:11px;color:#8b949e"></div>
      </div>
    </div>

    <!-- AI Tab -->
    <div class="tab-content" id="tab-ai">
      <div class="section">
        <label>API Key</label>
        <div style="display:flex;gap:6px">
          <input type="password" id="aiKey" placeholder="sk-..." autocomplete="off" style="flex:1" />
          <button id="btnAiKeyEdit" style="display:none;background:#30363d;color:#c9d1d9;border:1px solid #484f58;border-radius:4px;padding:0 10px;cursor:pointer;font-size:12px">编辑</button>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <select id="aiModel" style="flex:1">
            <option value="deepseek-v4-flash">deepseek-v4-flash</option>
            <option value="deepseek-v4-pro">deepseek-v4-pro</option>
            <option value="deepseek-chat">deepseek-chat (V3)</option>
            <option value="deepseek-reasoner">deepseek-reasoner (R1)</option>
          </select>
          <button id="btnAiTest" style="background:#238636;color:#fff;border:none">测试</button>
          <button id="btnAiSave">保存</button>
        </div>
        <div id="aiResult" style="margin-top:6px;font-size:11px"></div>
      </div>
      <div class="section">
        <label style="color:#58a6ff">AI 提示词模板</label>
        <p style="font-size:10px;color:#8b949e;margin-bottom:8px">变量: {copy}=文案, {style}=款号, {price}=价格, {imgs_count}=图片数</p>
      </div>
      <div class="section"><label><input type="checkbox" class="ai-toggle" data-key="title" checked /> 商品名称</label><textarea id="aiPrompt_title" rows="2">根据以下商品文案，生成一个简洁的商品标题（不含款号，款号会自动添加），不超过50字：\n{copy}</textarea></div>
      <div class="section"><label><input type="checkbox" class="ai-toggle" data-key="subtitle" checked /> 副标题</label><textarea id="aiPrompt_subtitle" rows="2">根据商品信息提取副标题（卖点提炼），不超过25字：\n{copy}</textarea></div>
      <div class="section"><label><input type="checkbox" class="ai-toggle" data-key="short" checked /> 短标题</label><textarea id="aiPrompt_short" rows="2">提取极简短标题（核心品类词），不超过15字：\n{copy}</textarea></div>
      <div class="section"><label><input type="checkbox" class="ai-toggle" data-key="category" checked /> 商品分类</label><textarea id="aiPrompt_category" rows="2">根据以下商品文案，从以下分类中选择最合适的一个，只输出分类名：\n衬衫、工装裤、西装/西裤、马甲吊带、打底衫、毛衣/针织、外套/大衣、T恤、卫衣、牛仔裤、休闲裤、短裤、连衣裙、短裙、长裙\n\n{copy}</textarea></div>
      <div class="section"><label><input type="checkbox" class="ai-toggle" data-key="keywords" checked /> 搜索关键词</label><textarea id="aiPrompt_keywords" rows="2">根据商品文案提取搜索关键词，用英文分号;分隔，5-8个词，包含品类/风格/季节/版型：\n{copy}</textarea></div>
      <div class="section"><label><input type="checkbox" class="ai-toggle" data-key="features" checked /> 商品特征标签</label><textarea id="aiPrompt_features" rows="2">提取商品特征标签，用英文分号;分隔，如面料、版型、风格等：\n{copy}</textarea></div>
    </div>
  </div>
</div>

<div id="fixModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:10000;background:rgba(0,0,0,.7);align-items:center;justify-content:center">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;width:420px;max-width:90vw">
    <div style="font-size:14px;color:#c9d1d9;margin-bottom:4px">修正商品信息 <span id="fixProgress" style="color:#8b949e;font-size:12px"></span></div>
    <div style="font-size:11px;color:#d2991d;margin-bottom:4px" id="fixField"></div>
    <div style="font-size:11px;color:#8b949e;margin-bottom:2px">款号: <b id="fixStyle" style="color:#c9d1d9"></b></div>
    <div style="font-size:11px;color:#8b949e;margin-bottom:12px;max-height:34px;overflow:hidden" id="fixTitle"></div>
    <input type="text" id="fixInput" style="margin-bottom:12px;font-size:14px;padding:10px" placeholder="请输入..." />
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button id="fixSkip" style="background:#30363d;color:#c9d1d9;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px">跳过</button>
      <button id="fixConfirm" style="background:#238636;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">确认并继续</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<button id="smartBtn">智能预选</button>

<script src="builder.js"></script>
</body>
</html>
